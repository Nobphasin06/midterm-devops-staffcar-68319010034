name: CI Pipeline

on:
  push:
    branches: [ "develop", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: cd backend && npm install
      - name: Run Lint
        run: cd backend && npm run lint

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: cd backend && npm install
      - name: Run Unit Tests
        run: cd backend && npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Backend Docker Image
        run: docker build ./backend -t staffcar-api:test
      - name: Build Frontend Docker Image
        run: docker build ./frontend -t staffcar-web:test