<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลรถของบุคลากร วิทยาลัยเทคนิคเลย</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4 text-center">🚗 ระบบบันทึกข้อมูลรถของบุคลากร (staffcar)</h2>

        <!-- Form เพิ่ม/แก้ไขข้อมูล -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title" id="formTitle">เพิ่มข้อมูลรถใหม่</h5>
                <form id="carForm">
                    <input type="hidden" id="carId">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">ทะเบียนรถ</label>
                            <input type="text" id="plate_no" class="form-dash form-control" required
                                placeholder="กข 1234 เลย">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">ประเภทรถ</label>
                            <select id="type" class="form-select">
                                <option value="รถยนต์">รถยนต์</option>
                                <option value="รถจักรยานยนต์">รถจักรยานยนต์</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">ยี่ห้อ/รุ่น</label>
                            <input type="text" id="brand_model" class="form-control" required
                                placeholder="Toyota Civic">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">สีรถ</label>
                            <input type="text" id="color" class="form-control" required placeholder="ขาว">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">ชื่อเจ้าของ</label>
                            <input type="text" id="owner" class="form-control" required placeholder="นายสมชาย ใจดี">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">แผนกวิชา</label>
                            <input type="text" id="department" class="form-control" required
                                placeholder="คอมพิวเตอร์กราฟิก">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">สถานะสติกเกอร์</label>
                            <select id="status" class="form-select">
                                <option value="รอออก">รอออก</option>
                                <option value="ออกแล้ว">ออกแล้ว</option>
                                <option value="หมดอายุ">หมดอายุ</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary mt-3" id="saveBtn">บันทึกข้อมูล</button>
                    <button type="button" class="btn btn-secondary mt-3 d-none" id="cancelBtn"
                        onclick="resetForm()">ยกเลิก</button>
                </form>
            </div>
        </div>

        <!-- ตารางแสดงข้อมูล -->
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">รายชื่อรถที่ลงทะเบียน</h5>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ทะเบียน</th>
                            <th>ประเภท</th>
                            <th>ยี่ห้อ/รุ่น</th>
                            <th>สี</th>
                            <th>เจ้าของ</th>
                            <th>แผนก</th>
                            <th>สถานะ</th>
                            <th>จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="carTableBody">
                        <!-- Data will be loaded here via JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Footer แสดงตัวตนตามเงื่อนไขข้อสอบ -->
        <footer class="mt-5 py-3 text-center text-muted border-top">
            <p>พัฒนาโดย: <strong>นายสมพงษ์ เรียนดี</strong> (รหัสนักศึกษา: 663090100xx) <br> ระดับชั้น สสค.2 กลุ่ม 1 |
                วิทยาลัยเทคนิคเลย</p>
        </footer>
    </div>

    <script>
        const API_URL = '/api/staffcar';

        document.getElementById('carForm').addEventListener('submit', saveCar);

        async function loadCars() {
            try {
                const res = await fetch(API_URL);
                const cars = await res.json();
                const tbody = document.getElementById('carTableBody');
                tbody.innerHTML = '';
                cars.forEach(car => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${car.plate_no}</td>
                            <td>${car.type}</td>
                            <td>${car.brand_model}</td>
                            <td>${car.color}</td>
                            <td>${car.owner}</td>
                            <td>${car.department}</td>
                            <td><span class="badge ${car.status === 'ออกแล้ว' ? 'bg-success' : car.status === 'รอออก' ? 'bg-warning' : 'bg-danger'}">${car.status}</span></td>
                            <td>
                                <button class="btn btn-sm btn-info" onclick="editCar(${car.id})">แก้ไข</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteCar(${car.id})">ลบ</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error("Error loading cars:", err);
            }
        }

        async function saveCar(e) {
            e.preventDefault();
            const id = document.getElementById('carId').value;
            const carData = {
                plate_no: document.getElementById('plate_no').value,
                type: document.getElementById('type').value,
                brand_model: document.getElementById('brand_model').value,
                color: document.getElementById('color').value,
                owner: document.getElementById('owner').value,
                department: document.getElementById('department').value,
                status: document.getElementById('status').value
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(carData)
            });

            resetForm();
            loadCars();
        }

        async function editCar(id) {
            const res = await fetch(`${API_URL}/${id}`);
            const car = await res.json();

            document.getElementById('carId').value = car.id;
            document.getElementById('plate_no').value = car.plate_no;
            document.getElementById('type').value = car.type;
            document.getElementById('brand_model').value = car.brand_model;
            document.getElementById('color').value = car.color;
            document.getElementById('owner').value = car.owner;
            document.getElementById('department').value = car.department;
            document.getElementById('status').value = car.status;

            document.getElementById('formTitle').innerText = 'แก้ไขข้อมูลรถ';
            document.getElementById('cancelBtn').classList.remove('d-none');
        }

        async function deleteCar(id) {
            if (confirm('คุณแน่ใจหรือไม่ที่จะลบข้อมูลนี้?')) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadCars();
            }
        }

        function resetForm() {
            document.getElementById('carForm').reset();
            document.getElementById('carId').value = '';
            document.getElementById('formTitle').innerText = 'เพิ่มข้อมูลรถใหม่';
            document.getElementById('cancelBtn').classList.add('d-none');
        }

        // โหลดข้อมูลครั้งแรกเมื่อเปิดหน้าเว็บ
        loadCars();
    </script>
</body>

</html>
