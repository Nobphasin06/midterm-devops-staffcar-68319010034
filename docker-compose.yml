version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: staffcar-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: staffcar_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: staffcar-api
    ports:
      - "5000:5000"
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=yourpassword
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=staffcar_db
      - PORT=5000
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: staffcar-web
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
